    <h1>猫国論 - 猫国最強伝説より</h1>
    <p>犬と猫は違う。犬は「ワン」と鳴くが、猫は「ニャー」と鳴く。</p>
    <p>では、何故猫の方が優れていると思うのか。それは犬猫の『鳴き声』に隠れている。</p>
    <p>先述通り、犬は「ワン」と鳴くが、猫は「ニャー」と鳴く。</p>
    <p>このオノマトペを数字化してみると、犬の「ワン」は"1(one)"猫の「ニャー」は"28(にや)"となる。</p>
    <p>そう考えると、やはり猫は犬よりも大きく、優れている存在だと言えるのかもしれない。</p>
